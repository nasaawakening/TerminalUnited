name: Terminal United Pro Release

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Generate Version
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION_CODE=$COMMIT_COUNT
          VERSION_NAME="1.0.$COMMIT_COUNT"
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Licenses
        run: yes | sdkmanager --licenses

      - name: Grant Execute Permission
        run: chmod +x gradlew

- name: Download bootstrap
  run: |
    cd app/src/main/cpp
    wget https://example.com/bootstrap-aarch64.zip

      - name: Build Release
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/*.apk \
            TerminalUnited-v${{ steps.version.outputs.VERSION_NAME }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION_NAME }}
          name: TerminalUnited v${{ steps.version.outputs.VERSION_NAME }}
          files: TerminalUnited-v${{ steps.version.outputs.VERSION_NAME }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}